<!DOCTYPE html><!-- chrome://external-file/2412.00119.pdf -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aura PaperWeb Live</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
ul { list-style-type: none; }
li { margin:5px 0; cursor:pointer; }
li span { background:#e0e0e0; padding:2px 5px; border-radius:3px; }
.collapsed > ul { display: none; }
.search { margin-bottom: 10px; padding: 5px; width: 300px; }
</style>
</head>
<body>
<h1>Aura PaperWeb Live</h1>
<input type="text" class="search" placeholder="Search sheets/functions...">

<div id="paperweb"></div>

<script>
fetch("paperweb_live.json")
.then(resp => resp.json())
.then(data => {
    const container = document.getElementById("paperweb");

    function createNode(name, children=null){
        const li = document.createElement("li");
        const span = document.createElement("span");
        span.textContent = name;
        li.appendChild(span);

        if(children){
            const ul = document.createElement("ul");
            for(const childName in children){
                ul.appendChild(createNode(childName, children[childName] && Object.keys(children[childName]).length > 0 ? children[childName] : null));
            }
            li.appendChild(ul);
            li.classList.add("collapsed");
            span.onclick = ()=> li.classList.toggle("collapsed");
        }
        return li;
    }

    const ulRoot = document.createElement("ul");
    for(const ext in data.extensions){
        ulRoot.appendChild(createNode(ext, data.extensions[ext]));
    }
    container.appendChild(ulRoot);

    // Search filter
    document.querySelector(".search").addEventListener("input", e => {
        const filter = e.target.value.toLowerCase();
        document.querySelectorAll("li span").forEach(span => {
            if(span.textContent.toLowerCase().includes(filter)){
                span.style.background = "#ffd54f";
            } else {
                span.style.background = "#e0e0e0";
            }
        });
    });
});
</script>
</body>
</html>
